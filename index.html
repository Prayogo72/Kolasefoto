<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolase Foto & Laporan 5s</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div id="screenMenu" class="screen active">
            <h2>Pilih Metode Progress</h2>
            <div class="menu-box">
                <button class="menu-btn btn-kolase" onclick="switchScreen('screenKolase')">
                    Kolase Foto (Maks 20 Foto)
                </button>
                <button class="menu-btn btn-5s" onclick="switchScreen('screen5S')">
                    Progress 5S (Sebelum / Sesudah)
                </button>
            </div>
        </div>

        <div id="screenKolase" class="screen">
            <button class="back-btn" onclick="switchScreen('screenMenu')">⬅ Kembali ke Menu</button>
            <h3>Kolase Foto (1x1)</h3>
            
            <div class="input-group">
                <label for="inputKolase">Pilih Foto dari Galeri (Maksimal 20):</label>
                <input type="file" id="inputKolase" accept="image/*" multiple>
                <p id="statusFoto" style="font-weight: bold; color: #007bff; margin-top: 8px;">Total Terisi: 0 / 20 Foto</p>
                <p class="info-text">Susunan grid paten 5x4.</p>
            </div>

            <div class="canvas-area">
                <canvas id="canvasKolase"></canvas>
            </div>

            <button class="action-btn" onclick="downloadCanvas('canvasKolase', 'kolase-matriks')">Simpan Hasil Gambar</button>
        </div>

        <div id="screen5S" class="screen">
            <button class="back-btn" onclick="switchScreen('screenMenu')">⬅ Kembali ke Menu</button>
            <h3>Workspace: Progress 5S (Standar Kertas Legal)</h3>
            
            <div class="input-group">
                <h4 style="margin-bottom: 10px;">Tambah Baris Laporan (Maks 10 Baris)</h4>
                
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div>
                        <label style="font-size: 12px; color: #555;">1. Pilih 2 Foto Sekaligus (Foto 1 = Sebelum, Foto 2 = Sesudah):</label>
                        <input type="file" id="inputBatch5S" accept="image/*" multiple>
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #555;">2. Kode Lokasi:</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="inputLokasi" placeholder="Contoh: G1K-051" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                            <button type="button" onclick="bukaModalLokasi()" style="background: #e67e22; color: white; border: none; padding: 0 12px; border-radius: 4px; font-weight: bold; cursor: pointer;">
                                📍 Pilih Lokasi
                            </button>
                        </div>
                    </div>
                    
                    <button class="action-btn" onclick="tambahBaris5S()" style="background-color: #ff8c00; margin-top: 5px; padding: 10px;">
                        Tambah Baris
                    </button>
                    <button type="button" onclick="hapusBarisTerakhir5S()" style="width: 100%; background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 5px; font-weight: bold; cursor: pointer;">
                        Hapus 
                    </button>
                </div>
                
                <p id="status5S" style="font-weight: bold; color: #ff8c00; margin-top: 10px;">Total Terisi: 0 / 10 Baris</p>
            </div>

            <div class="canvas-area">
                <canvas id="canvas5S"></canvas>
            </div>

            <button class="action-btn" onclick="downloadCanvas('canvas5S', 'laporan-5s-legal')">Simpan Laporan (Format Legal)</button>
        </div>

    </div>

    <div id="modal-lokasi" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; padding: 15px;">
        <div style="background: white; width: 100%; max-width: 450px; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <h4 style="margin: 0; color: #2c3e50;">Library Lokasi Logisteed</h4>
                <button onclick="tutupModalLokasi()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #95a5a6;">&times;</button>
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 15px; justify-content: center;">
                <button type="button" onclick="tampilkanG(1)" style="background: #3498db; color: white; border: none; padding: 8px 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">G1</button>
                <button type="button" onclick="tampilkanG(2)" style="background: #2ecc71; color: white; border: none; padding: 8px 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">G2</button>
                <button type="button" onclick="tampilkanG(3)" style="background: #9b59b6; color: white; border: none; padding: 8px 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">G3</button>
            </div>
            <div id="konten-lokasi" style="flex: 1; min-height: 200px; max-height: 50vh; overflow-y: auto;">
                <p style="text-align: center; color: #7f8c8d; margin-top: 50px;">Pilih kategori G1/G2/G3 di atas...</p>
            </div>
        </div>
    </div>

    <script src="js/library-lokasi.js"></script>
    <script src="js/engine-kolase.js"></script>
    <script src="js/engine-5s.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
