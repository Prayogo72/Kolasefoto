name: Build Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # PERBAIKAN 1: Menggunakan Java JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # PERBAIKAN 2: Install dependensi dari package.json yang baru dibuat
      - name: Install Dependencies
        run: npm install

      # PERBAIKAN 3: Membuat folder android & sinkronisasi Capacitor secara otomatis
      - name: Capacitor Sync
        run: |
          npx cap add android
          npx cap sync android

      # PROSES BUILD: Menjalankan Gradle build di dalam folder android yang sudah digenerate
      - name: Build Android App via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      # OPSIONAL: Upload hasil APK agar bisa kamu download setelah build selesai
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
