name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp -r js www/

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Config
        run: |
          npx cap init "Kolase 5S App" "com.logisteed.kolase5s" --web-dir=www

      - name: Add Android Platform and Sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android App via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/actions-artifact@v4
        with:
          name: kolase-5s-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk